# ==================== 限流配置 ====================
# 全局限流：保护服务器总承载能力（所有请求加起来）
limit_req_zone $binary_remote_addr zone=global_limit:10m rate=10000r/s;

# 限流日志级别
limit_req_log_level warn;
# 限流返回状态码
limit_req_status 429;
# ==================== 限流配置结束 ====================

# 博客服务配置（开发环境，HTTP only）
server {
    gzip on;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";
    gzip_static on;
    gzip_min_length 256;
    gzip_buffers 32 8k;
    gzip_http_version 1.1;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/javascript application/x-javascript application/xml application/xml+rss application/emacscript application/json image/svg+xml;

    listen 80;
    server_name hsk423.dev www.hsk423.dev;

    # 流式响应特殊配置
    location /api/ai-chat/message/stream {
        # 禁用代理缓冲，确保流式数据实时传输
        proxy_buffering off;
        
        # 禁用请求缓冲
        proxy_request_buffering off;
        
        # 设置较长的超时时间
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 保持连接
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # 设置必要的头部
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 禁用gzip压缩，避免影响流式数据
        proxy_set_header Accept-Encoding "";
        
        # 代理到后端服务（容器间通信）
        proxy_pass http://server-blog:8080/api/ai-chat/message/stream;
    }

    location /api/ {
        # 只应用全局限流（基础设施保护）
        limit_req zone=global_limit burst=1000 nodelay;
        
        # 允许上传大文件（分片上传每块4MB，设置10MB余量）
        client_max_body_size 10m;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header REMOTE-HOST $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 代理到后端服务（容器间通信）
        proxy_pass http://server-blog:8080/api/;
    }

    # 代理到 Next.js SSR 服务器
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://web-blog:3000;
    }

    location /uploads/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 代理到后端服务的uploads目录
        proxy_pass http://server-blog:8080/uploads/;
    }
}

# SSO认证服务配置（开发环境，HTTP only）
server {
    gzip on;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";
    gzip_static on;
    gzip_min_length 256;
    gzip_buffers 32 8k;
    gzip_http_version 1.1;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/javascript application/x-javascript application/xml application/xml+rss application/emacscript application/json image/svg+xml;

    listen 80;
    server_name sso.hsk423.dev;

    # API代理到认证后端服务
    location /api/ {
        # 只应用全局限流（基础设施保护）
        limit_req zone=global_limit burst=1000 nodelay;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header REMOTE-HOST $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 代理到认证后端服务（容器间通信）
        proxy_pass http://server-auth:8080/api/;
    }

    # 静态文件代理到认证前端容器
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://web-auth:80;
    }
}
