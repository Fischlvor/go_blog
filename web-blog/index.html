<!DOCTYPE html>
<html lang="zh">
    <head>
        <meta charset="UTF-8">
        <link rel="icon" href="/api/v1/website/logo">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title></title>
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.ts"></script>
        <script>
            fetch('/api/v1/website/title')
                .then(response => response.json())
                .then(res => {
                    if (res.code === "0000") {
                        document.title = res.data.title
                    }
                })
        </script>
    </body>
</html>
